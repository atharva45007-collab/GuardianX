<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardianX Security Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #060e1a; color: #c8d6e5; }
    .card { background: #0d1b2e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    h2 { color: #00ff9c; margin-bottom: 10px; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body class="h-full p-6">

  <h1 class="text-3xl font-bold mb-6 text-center text-[#00ff9c]">GuardianX Security Dashboard</h1>

  <!-- Dashboard Card -->
  <div class="card">
    <h2>System Status</h2>
    <pre id="dashboard">Loading...</pre>
  </div>

  <!-- Logs Card -->
  <div class="card">
    <h2>Logs</h2>
    <pre id="logs">Loading...</pre>
  </div>

  <!-- Leak Data Card -->
  <div class="card">
    <h2>Leak Data</h2>
    <pre id="leaks">Loading...</pre>
  </div>

  <!-- Report Card -->
  <div class="card">
    <h2>Security Report</h2>
    <pre id="report">Loading...</pre>
  </div>

  <!-- Toast Container -->
  <div id="toast" class="fixed bottom-5 right-5 bg-[#0d1b2e] text-[#00ff9c] px-4 py-2 rounded hidden"></div>

  <script>
    const API_BASE = "https://guardianx-a6fe.onrender.com";

    // Toast helper
    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.remove("hidden");
      toast.style.opacity = "1";
      setTimeout(() => {
        toast.style.transition = "opacity 0.3s ease";
        toast.style.opacity = "0";
        setTimeout(() => toast.classList.add("hidden"), 300);
      }, 2500);
    }

    // Dashboard
    fetch(`${API_BASE}/api/dashboard`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("dashboard").textContent = JSON.stringify(data, null, 2);
        showToast("Dashboard data loaded ✅");
      })
      .catch(err => showToast("Error loading dashboard ❌"));

    // Logs
    fetch(`${API_BASE}/api/logs`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("logs").textContent = JSON.stringify(data, null, 2);
        showToast("Logs fetched ✅");
      })
      .catch(err => showToast("Error loading logs ❌"));

    // Leak Data
    fetch(`${API_BASE}/api/leaks`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("leaks").textContent = JSON.stringify(data, null, 2);
        showToast("Leak data loaded ✅");
      })
      .catch(err => showToast("Error loading leaks ❌"));

    // Report
    fetch(`${API_BASE}/api/report`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("report").textContent = data.report;
        showToast("Report generated ✅");
      })
      .catch(err => showToast("Error loading report ❌"));
  </script>
</body>
</html>
