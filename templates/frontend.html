<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardianX Security Dashboard</title>

  <!-- TailwindCSS & Icons -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Marvel:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0a0a0a;
      --card-bg: rgba(15, 23, 42, 0.95);
      --marvel-red: #ed1d24;
      --marvel-blue: #0066cc;
      --marvel-gold: #ffd700;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: 'Marvel', 'Outfit', sans-serif;
      background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a2e 50%, #16213e 100%);
      color: var(--text-main);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .marvel-btn {
      background: linear-gradient(45deg, var(--marvel-red), var(--marvel-blue));
      border: 2px solid var(--marvel-gold);
      color: white;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .marvel-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(237, 29, 36, 0.4);
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9));
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 102, 204, 0.3);
    }
  </style>
</head>

<body class="h-full flex flex-col items-center justify-center p-6">
  <div id="dashboard" class="glass p-8 rounded-lg w-full max-w-5xl">
    <h1 class="text-3xl font-bold mb-6 text-center">GuardianX Security Dashboard</h1>

    <div class="flex justify-center gap-4 mb-6">
      <button id="scan-btn" class="marvel-btn px-6 py-3 rounded">Scan System</button>
      <button id="check-breaches-btn" class="marvel-btn px-6 py-3 rounded">Check Breaches</button>
      <button id="predict-breaches-btn" class="marvel-btn px-6 py-3 rounded">Predict Risk</button>
      <button id="ai-recommendations-btn" class="marvel-btn px-6 py-3 rounded">AI Recommendations</button>
    </div>

    <div id="notifications" class="space-y-2"></div>
    <div id="threats-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6"></div>
  </div>

  <script>
    // ===== Environment Configuration =====
    const API_BASE_URL = window.ENV?.BACKEND_URL || "https://guardianx-c8o5.onrender.com/api";

    // ===== Utility: Notification System =====
    function showNotification(title, message, type = 'info') {
      const notif = document.createElement('div');
      notif.className = `p-4 rounded text-white ${type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`;
      notif.innerHTML = `<strong>${title}</strong><br>${message}`;
      document.getElementById('notifications').appendChild(notif);
      setTimeout(() => notif.remove(), 4000);
    }

    // ===== API Helper =====
    async function apiRequest(endpoint, method = 'GET', body = null) {
      try {
        const response = await fetch(`${API_BASE_URL}${endpoint}`, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : null
        });

        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        const data = await response.json();
        return { ok: true, data };
      } catch (error) {
        console.error("API Error:", error);
        showNotification("Error", error.message, "error");
        return { ok: false, error };
      }
    }

    // ===== Core Functionalities =====
    async function performMarvelScan() {
      showNotification("Scanning", "Initiating system scan...");
      const result = await apiRequest('/scan', 'POST');
      if (result.ok) showNotification("Scan Complete", "Threat analysis finished.", "success");
    }

    async function checkBreaches() {
      showNotification("Checking", "Fetching breach data...");
      const result = await apiRequest('/breaches');
      if (result.ok) renderThreats(result.data);
    }

    async function predictBreachRisk() {
      showNotification("Predicting", "Analyzing potential risks...");
      const result = await apiRequest('/predict');
      if (result.ok) showNotification("Prediction Complete", `Risk Level: ${result.data.risk}`, "success");
    }

    async function getAIRecommendations() {
      showNotification("AI Analysis", "Generating recommendations...");
      const result = await apiRequest('/recommendations');
      if (result.ok) showNotification("AI Ready", "Recommendations available in dashboard.", "success");
    }

    // ===== UI Rendering =====
    function renderThreats(threats) {
      const container = document.getElementById('threats-container');
      container.innerHTML = '';
      threats.forEach(threat => {
        const card = document.createElement('div');
        card.className = 'stat-card p-4 rounded';
        card.innerHTML = `
          <h3 class="text-lg font-bold">${threat.filename}</h3>
          <p class="text-sm text-gray-400">Status: ${threat.status}</p>
          <div class="mt-3 flex gap-2">
            <button class="marvel-btn px-3 py-1 rounded" onclick="quarantineThreat('${threat.id}')">Quarantine</button>
            <button class="marvel-btn px-3 py-1 rounded" onclick="deleteThreat('${threat.id}')">Delete</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ===== Threat Management =====
    async function quarantineThreat(id) {
      const result = await apiRequest(`/threats/${id}/quarantine`, 'PUT');
      if (result.ok) showNotification("Threat Quarantined", "Threat successfully isolated.", "success");
    }

    async function deleteThreat(id) {
      const result = await apiRequest(`/threats/${id}`, 'DELETE');
      if (result.ok) showNotification("Threat Removed", "Threat deleted from system.", "success");
    }

    // ===== Initialization =====
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      showNotification("Welcome to GuardianX", "AI-powered cyber defense system activated", "success");

      document.getElementById("scan-btn").addEventListener("click", performMarvelScan);
      document.getElementById("check-breaches-btn").addEventListener("click", checkBreaches);
      document.getElementById("predict-breaches-btn").addEventListener("click", predictBreachRisk);
      document.getElementById("ai-recommendations-btn").addEventListener("click", getAIRecommendations);
    });
  </script>
</body>
</html>
